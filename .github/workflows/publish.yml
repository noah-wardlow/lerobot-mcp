name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/lerobot-mcp/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine target version
        id: version
        run: |
          version="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "value=$version" >> "$GITHUB_OUTPUT"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/lerobot-mcp/${version}/json")"
          if [ "$status" = "200" ]; then
            echo "lerobot-mcp ${version} is already on PyPI; skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "lerobot-mcp ${version} is not on PyPI (HTTP ${status}); will build and publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.version.outputs.should_publish == 'true'
        run: uv build

      - name: Publish package distributions
        if: steps.version.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
